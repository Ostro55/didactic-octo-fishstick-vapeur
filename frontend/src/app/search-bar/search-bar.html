<div class="steam-search-container">

    <h2 class="search-title">🔍 Recherche avancée</h2>

    <div class="search-grid">

        <!-- Search text -->
        <div class="search-group full">
            <input
                    type="text"
                    [(ngModel)]="text"
                    placeholder="Rechercher..."
                    class="steam-input"
            />
            <button (click)="search()" class="steam-search-btn">Rechercher</button>
        </div>

        <!-- Price -->
        <div class="search-group">
            <label> Price min</label>
            <input type="number" [(ngModel)]="minprice" class="steam-input" />
        </div>

        <div class="search-group">
            <label> Price max</label>
            <input type="number" [(ngModel)]="maxprice" class="steam-input" />
        </div>

        <!-- Select -->
        <div class="search-group">
            <label> genres</label>
            <select [(ngModel)]="genresselect" class="steam-input">
                @for (i of this.genres; track $index) {
                    <option [value]="i">{{ i }}</option>
                }
            </select>
        </div>

    </div>
</div>
