<div class="steam-search-container">

    <h2 class="search-title">🔍 Recherche avancée</h2>

    <div class="search-grid">

        <!-- Search text -->
        <div class="search-group full">
            <input
                    type="text"
                    [(ngModel)]="text"
                    placeholder="Rechercher..."
                    class="steam-input"
            />
            <button (click)="search()" class="steam-search-btn">Rechercher</button>
        </div>

        <!-- Dates -->
        <div class="search-group">
            <label>📅 Date min</label>
            <input type="date" [(ngModel)]="mindate" class="steam-input" />
        </div>

        <div class="search-group">
            <label>📅 Date max</label>
            <input type="date" [(ngModel)]="maxdate" class="steam-input" />
        </div>

        <!-- Select -->
        <div class="search-group">
            <label>📐 Taille</label>
            <select [(ngModel)]="sizeselect" class="steam-input">
                @for (i of this.api.size; track $index) {
                    <option [value]="i[0]">{{ i[0] }}</option>
                }
            </select>
        </div>

        <div class="search-group">
            <label>🛡️ Safe</label>
            <select [(ngModel)]="safeselect" class="steam-input">
                @for (i of safe; track $index) {
                    <option [value]="i[0]">{{ i[0] }}</option>
                }
            </select>
        </div>

        <div class="search-group">
            <label>↕️ Tri</label>
            <select [(ngModel)]="sortselect" class="steam-input">
                @for (i of sort; track $index) {
                    <option [value]="i">{{ i }}</option>
                }
            </select>
        </div>

        <!-- Checkboxes -->
        <div class="search-group checkbox-group">
            <label class="steam-checkbox">
                <input type="checkbox" [(ngModel)]="is_hasgeo">
                <span></span> Has geo
            </label>

            <label class="steam-checkbox">
                <input type="checkbox" [(ngModel)]="is_ingallery">
                <span></span> In gallery
            </label>
        </div>

        <!-- Tags -->
        <div class="search-group full">
            <input
                    type="text"
                    [(ngModel)]="texttag"
                    placeholder="Tags : art, game, fantasy..."
                    class="steam-input"
            />
        </div>

    </div>
</div>
