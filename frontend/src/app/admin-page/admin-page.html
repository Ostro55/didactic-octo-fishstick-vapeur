<app-home-button ></app-home-button>

<div class="admin-container">

    <div class="admin-card header-card">
        <h1>🎮 Super Administrateur</h1>
        <p class="email">
            Connecté en tant que <span>{{ this.authService.userInfo?.email }}</span>
        </p>

        <button class="logout-btn" (click)="seDeconnecter()">
            Se déconnecter
        </button>
    </div>

    <div class="admin-grid">

        <div class="admin-card">
            <h2>🚫 Bannir un utilisateur</h2>
            <form (ngSubmit)="ban(banUserId)">
                <input type="text" [(ngModel)]="banUserId" name="banUserId" placeholder="ID utilisateur à bannir">
                <button type="submit" class="danger-btn">Bannir</button>
            </form>
        </div>

        <div class="admin-card">
            <h2>✅ Débannir un utilisateur</h2>
            <form (ngSubmit)="unban(unbanUserId)">
                <input type="text" [(ngModel)]="unbanUserId" name="unbanUserId" placeholder="ID utilisateur à débannir">
                <button type="submit" class="success-btn">Débannir</button>
            </form>
        </div>

    </div>

</div>
