<div class="results-container">
    <h2 class="results-title">🎮 Résultats de recherche</h2>

    @if (this.imagelistv2 | async; as l) {
        <div class="results-grid">
            @for (i of l; track i.id) {
                <div class="result-card">
                    <app-image-item
                            [id]="i.id"
                            [image]="i">
                    </app-image-item>
                </div>
            }
        </div>
    }
</div>
