
<div class="bordered-div" (click)="showinfo()">
    <!-- <p> id: {{id}}</p> -->
    <p> name: {{image.name}}</p>
    <!-- <p> description: {{image.description}}</p> -->
    <p> editor: {{image.editor}}</p>
    @if (image.price <= 0) {
        <p>price: FREE!</p>
    } @else {
        <p> price: {{image.price}}</p>
    }
    <p> genre: {{image.genre}}</p>

    <!-- <p> date publication: {{image.makingTime}}</p> -->

</div>
