openapi: 3.0.3
info:
  title: back-work API
  version: 0.0.1-SNAPSHOT
  description: |
    Documentation OpenAPI alignee sur les controllers Spring actuellement exposes.
servers:
  - url: http://localhost:8080

paths:
  /games:
    get:
      summary: Lister les jeux
      description: Retourne tous les jeux ou un sous-ensemble filtre par nom, genre et intervalle de prix.
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: Filtre par nom.
        - name: genre
          in: query
          required: false
          schema:
            type: string
          description: Filtre par genre. Le filtre est traite en ignorant la casse.
        - name: minPrice
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
          description: Prix minimum inclus.
        - name: maxPrice
          in: query
          required: false
          schema:
            type: integer
            format: int64
            minimum: 0
          description: Prix maximum inclus.
      responses:
        "200":
          description: Liste de jeux.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Game"
    post:
      summary: Creer un jeu
      description: Cree un jeu. Si `userId` est fourni, le statut est derive du role de l'utilisateur.
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: Identifiant de l'utilisateur auteur de la soumission.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GameCreate"
      responses:
        "201":
          description: Jeu cree.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: `userId` fourni mais utilisateur introuvable.
    delete:
      summary: Purger les jeux
      description: Supprime tous les jeux et les tables de jointure associees.
      responses:
        "204":
          description: Purge effectuee.

  /games/{id}:
    get:
      summary: Recuperer un jeu par id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Jeu trouve.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Jeu introuvable.

  /games/{id}/accept:
    put:
      summary: Accepter un jeu
      description: Force le statut du jeu a `accepted`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Jeu accepte.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Jeu introuvable.

  /games/{id}/rejected:
    put:
      summary: Rejeter un jeu
      description: Rejet definitif du jeu avec suppression en base de donnees.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Jeu rejete puis supprime. Le corps retourne la derniere representation connue avant suppression.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Game"
        "404":
          description: Jeu introuvable.

  /users:
    get:
      summary: Lister les utilisateurs
      responses:
        "200":
          description: Liste d'utilisateurs.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
    post:
      summary: Creer un utilisateur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: Utilisateur cree.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "500":
          description: Erreur interne lors de la creation.
    delete:
      summary: Purger les utilisateurs
      description: Supprime tous les utilisateurs et les liaisons vers les jeux recommandes.
      responses:
        "204":
          description: Purge effectuee.

  /users/{id}:
    get:
      summary: Recuperer un utilisateur par id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Utilisateur trouve.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Utilisateur introuvable.
    put:
      summary: Mettre a jour un utilisateur
      description: Met a jour username, email, isAdmin et recommendedGames. Le mot de passe envoye est ignore par le service.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Utilisateur mis a jour.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Utilisateur introuvable.
    delete:
      summary: Supprimer un utilisateur par id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Utilisateur supprime.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Utilisateur introuvable.

  /users/login:
    post:
      summary: Authentifier un utilisateur
      description: Verifie un couple email/mot de passe et retourne l'utilisateur sans le mot de passe.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserLogin"
      responses:
        "200":
          description: Utilisateur authentifie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "404":
          description: Utilisateur introuvable ou credentials invalides.

  /admin/audit/events:
    get:
      summary: Lire les derniers evenements d'audit Kafka
      description: |
        Lit les N derniers messages du topic d'audit et retourne la liste (ordre: plus recent en premier).
        Endpoint actif uniquement si `audit.kafka.enabled=true`.
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Nombre maximal d'evenements retournes.
      responses:
        "200":
          description: Evenements d'audit lus depuis Kafka.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditKafkaEventsResponse"
        "400":
          description: Parametre `limit` invalide.
        "503":
          description: Kafka indisponible.

components:
  schemas:
    Game:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: integer
          format: int64
          nullable: true
        description:
          type: string
          nullable: true
        release_date:
          type: string
          format: date-time
          nullable: true
        img_url:
          type: string
          nullable: true
        editor:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          description: Statut fonctionnel du jeu, par exemple `pending` ou `accepted`.
        genre:
          type: array
          nullable: true
          uniqueItems: true
          items:
            $ref: "#/components/schemas/GameGenre"
      required:
        - name

    GameCreate:
      type: object
      properties:
        name:
          type: string
        price:
          type: integer
          format: int64
          nullable: true
        description:
          type: string
          nullable: true
        release_date:
          type: string
          format: date-time
          nullable: true
        img_url:
          type: string
          nullable: true
        editor:
          type: string
          nullable: true
        status:
          type: string
          nullable: true
          description: Peut etre ecrase par le backend si `userId` est fourni.
        genre:
          type: array
          nullable: true
          uniqueItems: true
          items:
            $ref: "#/components/schemas/GameGenre"
      required:
        - name

    GameGenre:
      type: string
      enum:
        - action
        - romance
        - thriller
        - horror
        - multiplayer
        - singleplayer

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        isAdmin:
          type: boolean
        email:
          type: string
        recommendedGames:
          type: array
          nullable: true
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Game"
      required:
        - id
        - username
        - isAdmin
        - email
        - recommendedGames

    UserCreate:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        isAdmin:
          type: boolean
        email:
          type: string
        recommendedGames:
          type: array
          nullable: true
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Game"
      required:
        - username
        - password
        - isAdmin
        - email

    UserUpdate:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
          description: Champ accepte par l'endpoint mais ignore par le service de mise a jour.
        isAdmin:
          type: boolean
        email:
          type: string
        recommendedGames:
          type: array
          nullable: true
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Game"
      required:
        - username
        - isAdmin
        - email

    UserLogin:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuditKafkaEventsResponse:
      type: object
      properties:
        topic:
          type: string
        count:
          type: integer
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditKafkaRecord"
      required:
        - topic
        - count
        - items

    AuditKafkaRecord:
      type: object
      properties:
        partition:
          type: integer
        offset:
          type: integer
          format: int64
        timestamp:
          type: integer
          format: int64
          description: Timestamp Kafka (ms since epoch).
        key:
          type: string
          nullable: true
        event:
          type: object
          nullable: true
          description: Contenu JSON parse du message (si parse OK).
          additionalProperties: true
        raw:
          type: string
          nullable: true
          description: Valeur brute (si le JSON n'a pas pu etre parse).
      required:
        - partition
        - offset
        - timestamp
        - key
        - event
        - raw
