spring.application.name=back-work

# Default to postgres; override with env var (e.g. h2)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:postgres}

# JPA/Hibernate (shared)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.open-in-view=false

audit.topic=${AUDIT_TOPIC:audit-events}
audit.kafka.enabled=${AUDIT_KAFKA_ENABLED:false}
spring.kafka.admin.enabled=false
